    <radialGradient id="glow" cx="25%" cy="25%" r="70%">
      <stop offset="0" stop-color="#4d94ff" stop-opacity="0.22" />
      <stop offset="55%" stop-color="#4d94ff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#4d94ff" stop-opacity="0" />
